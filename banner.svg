<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <clipPath id="clip">
      <circle cx="95" cy="100" r="72"/>
    </clipPath>
    <linearGradient id="gradRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <animate attributeName="x1" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#007AFF">
        <animate attributeName="stop-color" values="#007AFF;#00C6FF;#5856D6;#FF2D55;#007AFF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%" stop-color="#00C6FF">
        <animate attributeName="stop-color" values="#00C6FF;#5856D6;#FF2D55;#007AFF;#00C6FF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%" stop-color="#5856D6">
        <animate attributeName="stop-color" values="#5856D6;#FF2D55;#007AFF;#00C6FF;#5856D6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FF2D55">
        <animate attributeName="stop-color" values="#FF2D55;#007AFF;#00C6FF;#5856D6;#FF2D55" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="200" fill="#0d1117" rx="14"/>

  <!-- Outer pulsing ring -->
  <circle cx="95" cy="100" r="84" fill="none" stroke="#007AFF" stroke-width="3" opacity="0.12">
    <animate attributeName="r" values="84;96;84" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.10;0.30;0.10" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Main animated gradient ring -->
  <circle cx="95" cy="100" r="80" fill="none" stroke="url(#gradRing)" stroke-width="4.5" opacity="0.95" filter="url(#glow)">
    <animate attributeName="r" values="80;84;80" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="3.5;5.5;3.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Profile photo via external URL -->
  <image x="23" y="28" width="144" height="144" clip-path="url(#clip)" 
         xlink:href="https://raw.githubusercontent.com/zeroes-ones/zeroes-ones/main/profile-photo.png"
         href="https://raw.githubusercontent.com/zeroes-ones/zeroes-ones/main/profile-photo.png"/>

  <!-- Name with fade-in -->
  <text x="185" y="65" fill="#ffffff" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="bold" opacity="0">
    Sandeep Kumar Penchala
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="0.3s"/>
  </text>

  <!-- Title -->
  <text x="185" y="92" fill="#8bbfff" font-family="system-ui,-apple-system,sans-serif" font-size="13" opacity="0">
    Engineering Manager &amp; Staff Software Engineer
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="0.8s"/>
  </text>

  <!-- Company badges -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="1.3s"/>
    <rect x="185" y="108" width="50" height="21" rx="10" fill="#21262d"/>
    <text x="210" y="122" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Okta</text>
    <rect x="241" y="108" width="62" height="21" rx="10" fill="#21262d"/>
    <text x="272" y="122" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">DocuSign</text>
    <rect x="309" y="108" width="68" height="21" rx="10" fill="#21262d"/>
    <text x="343" y="122" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Samsung</text>
    <rect x="383" y="108" width="40" height="21" rx="10" fill="#21262d"/>
    <text x="403" y="122" fill="#c9d1d9" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">Visa</text>
  </g>

  <!-- Location -->
  <text x="185" y="148" fill="#8b949e" font-family="system-ui,sans-serif" font-size="11" opacity="0">
    McKinney, TX  ·  16+ Years  ·  Mobile | Backend | AI
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="1.8s"/>
  </text>

  <!-- Scan line effect -->
  <line x1="0" y1="0" x2="720" y2="0" stroke="#007AFF" stroke-width="1" opacity="0.08">
    <animate attributeName="y1" values="0;200;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;200;0" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>